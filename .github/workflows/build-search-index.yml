name: Build Search Index

on:
  schedule:
    # Bi-weekly: Run at 03:00 UTC on the 1st and 15th of each month
    - cron: '0 3 1,15 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  build-search-index:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours — FTS5 trigram build on 2M rows needs time
    env:
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> $GITHUB_PATH

      - name: Download Podcast Index Database
        run: |
          echo "Downloading PI database dump..."
          curl -L -f -A "BoxCast/1.0 (github.com/ashwkun/box.cast.android)" -o podcastindex_feeds.db.tgz https://public.podcastindex.org/podcastindex_feeds.db.tgz
          echo "Extracting..."
          tar -xzf podcastindex_feeds.db.tgz
          ls -la *.db
          echo "Total podcasts: $(sqlite3 podcastindex_feeds.db 'SELECT COUNT(*) FROM podcasts;')"

      - name: Get chart iTunes IDs from main DB
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          node scripts/get-chart-itunes-ids.js > chart_itunes_ids.txt
          echo "Got $(wc -l < chart_itunes_ids.txt) iTunes IDs from charts"

      - name: Build Search Index
        run: |
          node scripts/build-search-index.js
          ls -lh search.db

      - name: Upload Search DB to Turso
        run: |
          echo "Destroying old search database..."
          turso db destroy boxcast-search --yes || echo "No existing DB to destroy"
          
          echo "Creating and importing new search database..."
          turso db create boxcast-search --group default --from-file search.db
          
          echo "Verifying..."
          turso db show boxcast-search

      - name: Update Worker Search Token
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Generate a fresh auth token for the new database
          NEW_TOKEN=$(turso db tokens create boxcast-search)
          echo "::add-mask::$NEW_TOKEN"
          
          # Update the Cloudflare Worker secret via API
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/boxcast-api/secrets" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"TURSO_SEARCH_TOKEN\", \"text\": \"${NEW_TOKEN}\", \"type\": \"secret_text\"}"
          
          echo "Worker secret TURSO_SEARCH_TOKEN updated automatically."

      - name: Cleanup
        run: rm -f *.db *.tgz *.csv *.txt
