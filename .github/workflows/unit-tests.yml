name: Unit Tests

on:
  push:
    branches: [ master, main, "cursor/**" ]
  pull_request:
    branches: [ master, main ]

jobs:
  unit-tests:
    name: testDebugUnitTest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stub google-services.json
        run: |
          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "0",
              "project_id": "boxlore-ci-stub",
              "storage_bucket": "boxlore-ci-stub.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0",
                  "android_client_info": {
                    "package_name": "cx.aswin.boxlore"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "ci-stub-not-a-real-key" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue
