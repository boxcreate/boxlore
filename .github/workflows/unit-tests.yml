name: Unit Tests

# Merge-gate only (not every PR push):
# - Add the `merge-ci` label when ready to merge → runs once on that commit.
# - Pushes do NOT re-trigger (no `synchronize`) — remove+re-add `merge-ci`,
#   or use Actions → Run workflow, to start another full gate.
# - `merge_group` kept for orgs that enable a merge queue later.
# Direct bot/owner pushes to master never open a PR, so they are unaffected.
on:
  pull_request:
    types: [labeled, opened, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

# One active run per PR/ref — later pushes cancel the backlog instead of queueing.
concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: testDebugUnitTest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'merge-ci'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # Real google-services.json lives in the GitHub Environment "release"
      # (GOOGLE_SERVICES_JSON_BASE64) and is not available to PR/push CI.
      # This stub only satisfies the Google Services Gradle plugin for unit tests.
      - name: Write CI stub google-services.json
        uses: ./.github/actions/write-ci-google-services

      - name: Architecture guards (boundaries + Konsist)
        run: |
          bash scripts/ci/check-feature-no-boxlore-database.sh
          bash scripts/ci/check-feature-no-posthog.sh
          ./gradlew :core:testing:testDebugUnitTest

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Verify Roborazzi screenshots
        run: ./gradlew :feature:home:verifyRoborazziDebug

      - name: Verify merged Kover coverage floor
        run: ./gradlew :koverVerifyMerged

      - name: Lint debug
        run: ./gradlew lintDebug

      - name: Dependency guard (app + core modules)
        run: ./gradlew :app:dependencyGuard :core:catalog:dependencyGuard :core:playback:dependencyGuard

      - name: Scrub google-services.json
        if: always()
        run: rm -f app/google-services.json
