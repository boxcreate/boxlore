name: Check New Episodes

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  check-episodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefix scripts

      - name: Authenticate GCP/Firebase
        run: |
          echo '${{ secrets.FCM_SERVICE_ACCOUNT_KEY }}' > gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/gcp-key.json" >> $GITHUB_ENV

      - name: Run New Episode Check
        run: node scripts/check-new-episodes.js
        env:
          PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
          PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}

      - name: Commit & Push State Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
          git add scripts/data/episode-tracker.json
          rm -f gcp-key.json
          git checkout -- . || true
          git clean -fd || true
          git diff --cached --quiet || (git commit -m "chore: update episode tracker state [skip ci]" && git pull --rebase origin master && git push)
