name: Merge queue external gates

# Merge queue required checks include SonarCloud + CodeRabbit + coderabbit-threads-resolved,
# which normally report on pull_request SHAs only. On merge_group, re-assert those
# conclusions as check runs on the queue SHA so the queue does not time out waiting.
#
# Does not invent a pass: fails if the contributing PR head never went green.
# For coderabbit-threads-resolved, re-evaluates live CodeRabbit threads (not a stale bridge).
on:
  merge_group:

permissions:
  checks: write
  contents: read
  pull-requests: read
  statuses: read

concurrency:
  group: merge-queue-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bridge-sonar-coderabbit:
    name: Bridge Sonar + CodeRabbit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Re-assert SonarCloud and CodeRabbit on merge group SHA
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.merge_group.head_sha;
            const headRef = context.payload.merge_group.head_ref || '';
            const prMatch = headRef.match(/\/pr-(\d+)-/);
            if (!prMatch) {
              core.setFailed(`Could not parse PR number from merge group ref: ${headRef}`);
              return;
            }
            const prNumber = Number(prMatch[1]);
            core.info(`Merge group bridges gates from PR #${prNumber} onto ${headSha}`);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const prHeadSha = pr.head.sha;

            async function latestCheckConclusion(name) {
              const checks = await github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: prHeadSha,
                check_name: name,
                per_page: 100,
              });
              if (checks.length > 0) {
                const newest = checks.sort((a, b) =>
                  Date.parse(b.completed_at || b.started_at || 0) -
                  Date.parse(a.completed_at || a.started_at || 0)
                )[0];
                return { kind: 'check', conclusion: newest.conclusion, status: newest.status };
              }

              const { data: statuses } = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: prHeadSha,
              });
              const matches = (statuses.statuses || []).filter((s) => s.context === name);
              if (matches.length === 0) {
                return { kind: 'missing', conclusion: null, status: null };
              }
              const newest = matches.sort((a, b) =>
                Date.parse(b.updated_at || 0) - Date.parse(a.updated_at || 0)
              )[0];
              return { kind: 'status', conclusion: newest.state, status: newest.state };
            }

            function isGreen(result) {
              if (!result || result.kind === 'missing') return false;
              const c = (result.conclusion || '').toLowerCase();
              return c === 'success' || c === 'neutral' || c === 'skipped';
            }

            const required = ['SonarCloud Code Analysis', 'CodeRabbit'];
            const failures = [];

            for (const name of required) {
              const result = await latestCheckConclusion(name);
              core.info(`${name}: ${JSON.stringify(result)}`);
              if (!isGreen(result)) {
                failures.push(
                  `${name} was not green on PR #${prNumber} head ${prHeadSha} ` +
                  `(${result.kind}: ${result.conclusion || result.status || 'missing'})`
                );
                continue;
              }

              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                head_sha: headSha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: `${name} (bridged from PR #${prNumber})`,
                  summary:
                    `Re-asserted green ${name} from PR head \`${prHeadSha}\` ` +
                    `onto merge group SHA \`${headSha}\`.`,
                },
              });
            }

            // Live gate: unresolved CodeRabbit threads must be resolved before merge.
            // Publishes the named required check `coderabbit-threads-resolved`.
            const threads = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { author { login } url body }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber,
            });
            const openCodeRabbit = (threads.repository.pullRequest.reviewThreads.nodes || [])
              .filter((t) => !t.isResolved && !t.isOutdated)
              .filter((t) => {
                const login = (t.comments?.nodes?.[0]?.author?.login || '').toLowerCase();
                return login.includes('coderabbit');
              });

            const threadsOk = openCodeRabbit.length === 0;
            const threadSummary = threadsOk
              ? `No unresolved, non-outdated CodeRabbit review threads on PR #${prNumber}.`
              : [
                  `### Unresolved CodeRabbit review threads (${openCodeRabbit.length})`,
                  '',
                  ...openCodeRabbit.map((t) => {
                    const c = t.comments?.nodes?.[0] || {};
                    const preview = (c.body || '').split('\n').find((l) => l.trim()) || '';
                    return `- **@${c.author?.login || 'coderabbit'}**: ${preview.slice(0, 160)}\n  ${c.url || ''}`;
                  }),
                  '',
                  'Merge is blocked until these threads are addressed and marked Resolved.',
                ].join('\n');

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'coderabbit-threads-resolved',
              head_sha: headSha,
              status: 'completed',
              conclusion: threadsOk ? 'success' : 'failure',
              output: {
                title: threadsOk
                  ? 'All CodeRabbit threads resolved'
                  : `${openCodeRabbit.length} unresolved CodeRabbit thread(s)`,
                summary: threadSummary,
              },
            });

            if (!threadsOk) {
              failures.push(
                `PR #${prNumber} has ${openCodeRabbit.length} unresolved CodeRabbit review thread(s)`
              );
            }

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
            }
