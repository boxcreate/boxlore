# Temporary probe — delete after verifying ruleset / PAT push paths.
name: Ruleset Push Probe
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'github-token | models-token'
        required: true
        default: 'github-token'
        type: choice
        options:
          - github-token
          - models-token
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve token
        id: tok
        env:
          MODE: ${{ inputs.mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "models-token" ]; then
            if [ -z "${GH_MODELS_TOKEN}" ]; then
              echo "::error::GH_MODELS_TOKEN secret is empty"
              exit 1
            fi
            echo "token=${GH_MODELS_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "Using GH_MODELS_TOKEN"
          else
            echo "token=${GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "Using GITHUB_TOKEN"
          fi
      - name: Token identity (no secret printed)
        env:
          GH_TOKEN: ${{ steps.tok.outputs.token }}
        run: |
          set -euo pipefail
          echo "login=$(gh api user --jq .login)"
          echo "id=$(gh api user --jq .id)"
          gh api user/memberships/orgs/boxcreate --jq '{role, state}' || echo "not an org member (likely app installation token)"
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ steps.tok.outputs.token }}
      - name: Attempt push to master
        env:
          GH_TOKEN: ${{ steps.tok.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          MODE="${{ inputs.mode }}"
          date -u +"mode=${MODE} at %Y-%m-%dT%H:%M:%SZ" > .github/ruleset-push-probe.txt
          git add .github/ruleset-push-probe.txt
          git commit -m "chore: ruleset push probe (${MODE}) [skip ci]"
          set +e
          OUT=$(git push origin master 2>&1)
          STATUS=$?
          set -e
          echo "$OUT"
          if [ "$STATUS" -eq 0 ]; then
            echo "PROBE_RESULT=success mode=${MODE}" >> "$GITHUB_STEP_SUMMARY"
            echo "Push SUCCEEDED with ${MODE}"
          else
            echo "PROBE_RESULT=failed mode=${MODE}" >> "$GITHUB_STEP_SUMMARY"
            echo "Push FAILED with ${MODE}"
            exit 1
          fi
