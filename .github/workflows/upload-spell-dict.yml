name: Upload Spell Dictionary

on:
  workflow_run:
    workflows: ["Sync Search Index"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the Sync Search Index workflow'
        required: true
        type: string

jobs:
  upload-kv:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id || inputs.run_id }}"
          echo "Downloading artifact from run $RUN_ID..."
          gh run download $RUN_ID -n spell-dictionary

      - name: Upload to Cloudflare KV
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest kv key put spell_dict_v1 --namespace-id=b97e807ebc7a47449effd0ce8d9f5b0c --path=spell_dict.json
