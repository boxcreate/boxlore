name: 🌀 Sync Turso Database Status with Qdrant

on:
  workflow_dispatch:

concurrency:
  group: sync-pi-data # Avoid running concurrently with daily/scheduled sync tasks

jobs:
  backfill:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install

      - name: Run Backfill Database Status
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          chmod +x scripts/backfill-db-status.js
          node scripts/backfill-db-status.js
