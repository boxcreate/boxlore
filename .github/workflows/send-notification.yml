name: Send boxlore Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Notification Title'
        required: true
        default: 'boxlore Update'
      body:
        description: 'Notification Body'
        required: true
        default: 'Check out the new features!'
      type:
        description: 'Where to show this message?'
        required: true
        default: 'both'
        type: choice
        options:
        - push
        - in-app
        - both
      route:
        description: 'Deep Link Route (Optional - e.g. podcast/123 or https://link)'
        required: false
      image:
        description: 'Image URL (Optional)'
        required: false
      target:
        description: 'Target Environment'
        required: true
        default: 'all_users'
        type: choice
        options:
        - all_users
        - debug_users
        - prod_users
      dry_run:
        description: 'Dry Run Mode (Validate only)'
        required: true
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
      collapse_key:
        description: 'Collapse Key (Optional)'
        required: false
        default: ''
      sound:
        description: 'Notification Sound'
        required: true
        default: 'default'
        type: choice
        options:
        - default
        - chime
        - announcement
        - silent
      action_label:
        description: 'Action Button Text'
        required: true
        default: 'View'
      show_action_in_push:
        description: 'Show action button in push notification?'
        required: true
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      show_action_in_app:
        description: 'Show action button in in-app popup?'
        required: true
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin
          
      - name: Send Notification
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FCM_SERVICE_ACCOUNT_KEY }}
        run: |
          python .github/scripts/manual_dispatch.py \
            --title "${{ inputs.title }}" \
            --body "${{ inputs.body }}" \
            --type "${{ inputs.type }}" \
            --route "${{ inputs.route }}" \
            --image "${{ inputs.image }}" \
            --target "${{ inputs.target }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --collapse-key "${{ inputs.collapse_key }}" \
            --sound "${{ inputs.sound }}" \
            --action-label "${{ inputs.action_label }}" \
            --show-action-in-push "${{ inputs.show_action_in_push }}" \
            --show-action-in-app "${{ inputs.show_action_in_app }}"
