name: Send boxlore Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Notification Title'
        required: true
        default: 'boxlore Update'
      body:
        description: 'Notification Body'
        required: true
        default: 'Check out the new features!'
      type:
        description: 'Where to show this message?'
        required: true
        default: 'both'
        type: choice
        options:
        - push
        - in-app
        - both
      route:
        description: 'Deep Link Route (Optional - e.g. podcast/123 or https://link)'
        required: false
      image:
        description: 'Image URL (Optional)'
        required: false
      target:
        description: 'Target Environment'
        required: true
        default: 'all_users'
        type: choice
        options:
        - all_users
        - debug_users
        - prod_users
      dry_run:
        description: 'Dry Run Mode (Validate only)'
        required: true
        default: 'false'
        type: choice
        options:
        - 'false'
        - 'true'
      collapse_key:
        description: 'Collapse Key (Optional)'
        required: false
        default: ''
      sound:
        description: 'Notification Sound'
        required: true
        default: 'default'
        type: choice
        options:
        - default
        - chime
        - announcement
        - silent
      action_label:
        description: 'Action Button Text'
        required: true
        default: 'View'
      show_action_in_push:
        description: 'Show action button in push notification?'
        required: true
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      show_action_in_app:
        description: 'Show action button in in-app popup?'
        required: true
        default: 'true'
        type: choice
        options:
        - 'true'
        - 'false'
      category:
        description: 'In-App category badge label'
        required: true
        default: "WHAT'S NEW"
  workflow_call:
    inputs:
      title:
        description: 'Notification title'
        required: true
        type: string
      body:
        description: 'Notification body'
        required: true
        type: string
      type:
        description: 'Where to show this message'
        required: true
        type: string
      route:
        description: 'Optional deep-link or external URL'
        required: false
        default: ''
        type: string
      image:
        description: 'Optional image URL'
        required: false
        default: ''
        type: string
      target:
        description: 'FCM topic'
        required: true
        type: string
      dry_run:
        description: 'Validate without sending'
        required: false
        default: 'false'
        type: string
      collapse_key:
        description: 'Optional Android collapse key'
        required: false
        default: ''
        type: string
      sound:
        description: 'Notification sound mode'
        required: false
        default: 'default'
        type: string
      action_label:
        description: 'Action button label'
        required: false
        default: 'View'
        type: string
      show_action_in_push:
        description: 'Show action in system push notification'
        required: false
        default: 'true'
        type: string
      show_action_in_app:
        description: 'Show action in in-app announcement'
        required: false
        default: 'true'
        type: string
      category:
        description: 'In-app category badge'
        required: false
        default: "WHAT'S NEW"
        type: string
    secrets:
      FCM_SERVICE_ACCOUNT_KEY:
        description: 'Firebase service-account JSON'
        required: true

jobs:
  send-notification:
    name: Send notification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin
          
      - name: Send Notification
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FCM_SERVICE_ACCOUNT_KEY }}
          NOTIFICATION_TITLE: ${{ inputs.title }}
          NOTIFICATION_BODY: ${{ inputs.body }}
          NOTIFICATION_TYPE: ${{ inputs.type }}
          NOTIFICATION_ROUTE: ${{ inputs.route }}
          NOTIFICATION_IMAGE: ${{ inputs.image }}
          NOTIFICATION_TARGET: ${{ inputs.target }}
          NOTIFICATION_DRY_RUN: ${{ inputs.dry_run }}
          NOTIFICATION_COLLAPSE_KEY: ${{ inputs.collapse_key }}
          NOTIFICATION_SOUND: ${{ inputs.sound }}
          NOTIFICATION_ACTION_LABEL: ${{ inputs.action_label }}
          NOTIFICATION_SHOW_ACTION_IN_PUSH: ${{ inputs.show_action_in_push }}
          NOTIFICATION_SHOW_ACTION_IN_APP: ${{ inputs.show_action_in_app }}
          NOTIFICATION_CATEGORY: ${{ inputs.category }}
        run: |
          python .github/scripts/manual_dispatch.py \
            --title "$NOTIFICATION_TITLE" \
            --body "$NOTIFICATION_BODY" \
            --type "$NOTIFICATION_TYPE" \
            --route "$NOTIFICATION_ROUTE" \
            --image "$NOTIFICATION_IMAGE" \
            --target "$NOTIFICATION_TARGET" \
            --dry-run "$NOTIFICATION_DRY_RUN" \
            --collapse-key "$NOTIFICATION_COLLAPSE_KEY" \
            --sound "$NOTIFICATION_SOUND" \
            --action-label "$NOTIFICATION_ACTION_LABEL" \
            --show-action-in-push "$NOTIFICATION_SHOW_ACTION_IN_PUSH" \
            --show-action-in-app "$NOTIFICATION_SHOW_ACTION_IN_APP" \
            --category "$NOTIFICATION_CATEGORY"
