name: 📊 Daily AI Summary

on:
  schedule:
    # 00:30 UTC = 6:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override date (YYYY-MM-DD in IST). Leave empty for yesterday.'
        required: false
      target_model:
        description: 'AI Model to use for summary'
        required: false
        default: 'gemini-3-flash-preview'
        type: choice
        options:
          - gemini-3-flash-preview
          - gemini-2.5-flash
          - gemini-2.5-flash-lite
          - gemini-3.1-flash-lite-preview

permissions:
  contents: read
  models: read

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    if: github.repository == 'ashwkun/box.cast.android'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install firebase-admin requests

      - name: Generate and send daily summary
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FCM_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_URL: https://api.aswin.cx
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          DATE_OVERRIDE: ${{ inputs.date_override }}
          TARGET_MODEL: ${{ inputs.target_model }}
          TELEMETRY_API_KEY: ${{ secrets.TELEMETRY_API_KEY }}
        run: python .github/scripts/daily_summary.py
