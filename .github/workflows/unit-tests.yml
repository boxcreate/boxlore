name: Unit Tests

# Runs when a PR enters the merge queue (merge click), or via manual dispatch.
# Not on every PR push — intermediate commits should not burn CI minutes.
# Direct bot/owner pushes to master do not use the merge queue and are unaffected.
on:
  merge_group:
  workflow_dispatch:

jobs:
  unit-tests:
    name: testDebugUnitTest
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # Real google-services.json lives in the GitHub Environment "release"
      # (GOOGLE_SERVICES_JSON_BASE64) and is not available to PR/push CI.
      # This stub only satisfies the Google Services Gradle plugin for unit tests.
      - name: Write CI stub google-services.json
        uses: ./.github/actions/write-ci-google-services

      - name: Architecture boundary (Home/Info no BoxLoreDatabase)
        run: bash scripts/ci/check-feature-no-boxlore-database.sh

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Verify merged Kover coverage floor
        run: ./gradlew :koverVerifyMerged

      # B0 — optional / non-blocking Android lint (does not fail the required check).
      - name: Lint debug (non-blocking)
        continue-on-error: true
        run: ./gradlew lintDebug

      - name: Scrub google-services.json
        if: always()
        run: rm -f app/google-services.json
