name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can fix it quickly.

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: "Which version of BoxLore are you running? (Check Settings or About)"
      placeholder: "e.g. v1.2.8"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS Version
      description: "Your device model and operating system version"
      placeholder: "e.g. OnePlus 12, Android 15"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area is affected?
      options:
        - Playback / Streams
        - Search
        - Explore
        - Settings
        - Network / Connectivity
        - UI / Design
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the bug clearly. What did you expect vs what actually happened?"
      placeholder: "When I play a podcast episode, it unexpectedly skips forward..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "How can we trigger this bug?"
      placeholder: |
        1. Open BoxLore
        2. Go to Library
        3. Select a Podcast
        4. ...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: "If applicable, add screenshots or a screen recording"
    validations:
      required: false
