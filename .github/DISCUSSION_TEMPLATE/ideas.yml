title: "💡 [Idea] "
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make BoxLore even better? We'd love to hear it! 📺
        Share it with the community here to get feedback.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Playback / Streams
        - Search
        - Explore
        - Settings
        - Network / Connectivity
        - UI / Design
        - New Feature
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe your idea
      description: "What would you like to see? How would it work?"
      placeholder: "I'd love to have a feature that..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: "How would this improve your watching experience?"
    validations:
      required: false
