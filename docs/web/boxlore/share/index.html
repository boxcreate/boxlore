<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boxlore Share</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0816;
            --text-primary: #ffffff;
            --text-secondary: #b3b0cb;
            --accent: #da7756;
            --accent-secondary: #a361ea;
            --shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Material 3 Expressive Background Shapes */
        .expressive-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            opacity: 0.12;
            filter: blur(8px);
            transform-origin: center;
            animation: float 20s ease-in-out infinite alternate;
        }

        .shape-sunny {
            top: 10%;
            right: 10%;
            width: 260px;
            height: 260px;
            color: var(--accent);
            animation-duration: 25s;
        }

        .shape-diamond {
            top: 45%;
            left: 5%;
            width: 220px;
            height: 220px;
            color: var(--accent-secondary);
            animation-duration: 28s;
            animation-delay: -5s;
        }

        .shape-flower {
            bottom: 10%;
            right: 15%;
            width: 320px;
            height: 320px;
            color: #e8a87c;
            animation-duration: 32s;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            50% {
                transform: translate(30px, -20px) rotate(180deg) scale(1.05);
            }
            100% {
                transform: translate(-20px, 40px) rotate(360deg) scale(0.95);
            }
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 48px 36px;
            text-align: center;
            box-shadow: var(--shadow);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-container {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            max-width: 260px;
            margin-left: auto;
            margin-right: auto;
        }

        .logo-image {
            width: 100%;
            height: auto;
            z-index: 1;
            filter: brightness(0) invert(1);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        p.subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Material 3 Progress Indicator */
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            margin: 0 auto 36px auto;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 28px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 20px rgba(163, 97, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(163, 97, 234, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px) scale(1.02);
        }

        .footer {
            margin-top: 36px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>

        <h1 id="status-title">Opening boxlore...</h1>
        <p class="subtitle" id="status-desc">Redirecting you to the shared podcast content. Please wait a moment.</p>

        <div class="spinner" id="spinner"></div>

        <div class="actions">
            <a id="btn-open" href="#" class="btn btn-primary">Open in boxlore App</a>
            <a id="btn-download" href="#" class="btn btn-secondary">Install boxlore</a>
        </div>

        <div class="footer">
            boxlore &copy; 2026
        </div>
    </div>

    <script>
        // Parse search parameters
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || '';
        const id = params.get('id') || '';
        const t = params.get('t') || '';

        // Generate Custom Scheme URL
        let customSchemeUrl = '';
        if (type === 'episode' && id) {
            customSchemeUrl = `boxlore://episode/${id}`;
            if (t) customSchemeUrl += `?t=${t}`;
        } else if (type === 'podcast' && id) {
            customSchemeUrl = `boxlore://podcast/${id}`;
        }

        // Generate Play Store (Install Referrer) Link
        const queryParamsString = window.location.search.substring(1);
        const encodedReferrer = encodeURIComponent(queryParamsString);
        const playStoreUrl = `https://play.google.com/store/apps/details?id=cx.aswin.boxlore&referrer=${encodedReferrer}`;

        // Update Buttons
        const openBtn = document.getElementById('btn-open');
        const downloadBtn = document.getElementById('btn-download');
        
        if (customSchemeUrl) {
            openBtn.href = customSchemeUrl;
        } else {
            openBtn.style.display = 'none';
        }
        
        downloadBtn.href = playStoreUrl;

        // Auto-redirect Attempt
        if (customSchemeUrl) {
            window.location.href = customSchemeUrl;

            // Fallback timeout if app is not installed
            setTimeout(() => {
                document.getElementById('status-title').innerText = "App not detected";
                document.getElementById('status-desc').innerText = "Looks like boxlore is not installed on this device. Install it to start listening!";
                document.getElementById('spinner').style.display = 'none';
                
                // Swap buttons to make "Install / Download" the primary action
                openBtn.className = "btn btn-secondary";
                downloadBtn.className = "btn btn-primary";
                downloadBtn.innerText = "Install boxlore";
            }, 2500);
        } else {
            document.getElementById('status-title').innerText = "Welcome to boxlore";
            document.getElementById('status-desc').innerText = "Get the ultimate podcast app to listen to your favorite shows.";
            document.getElementById('spinner').style.display = 'none';
        }
    </script>
