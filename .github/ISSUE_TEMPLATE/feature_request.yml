name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make BoxLore even better? We'd love to hear it! 📺

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Playback / Streams
        - Search
        - Explore
        - Settings
        - Network / Connectivity
        - UI / Design
        - New Feature
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: "What would you like to see? Be as detailed as possible."
      placeholder: "It would be great if the app could..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this useful?
      description: "How would this improve your listening experience?"
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / References
      description: "Any screenshots, sketches, or links to similar features in other apps?"
    validations:
      required: false
