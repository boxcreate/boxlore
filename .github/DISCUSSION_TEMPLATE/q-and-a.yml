title: "❓ [Question] "
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using BoxLore? Can't figure something out?
        Ask the community here! 🙋‍♂️

  - type: dropdown
    id: category
    attributes:
      label: What is this related to?
      options:
        - How-to / Usage
        - Troubleshooting
        - Supported Devices
        - Setup / Installation
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: What is your question?
      description: "Please be as specific as possible so others can help you better."
      placeholder: "How do I..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Any screenshots, device specs, or other relevant information."
    validations:
      required: false
